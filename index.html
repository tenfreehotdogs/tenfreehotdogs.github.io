<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>oneline</title>
<meta name="description" content="Paste a line of text. Get a link. No server, no database.">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>👻</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Space+Grotesk:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0b14;
    --surface: #17121f;
    --surface-2: #1e1729;
    --line: #2b2338;
    --text: #ece8f4;
    --muted: #8d84a3;
    --accent: #a78bfa;
    --accent-dim: #6d5bb8;
    --ok: #7ee2a8;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: "Space Grotesk", system-ui, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  main { width: 100%; max-width: 640px; }
  .brand {
    display: flex;
    align-items: baseline;
    gap: 10px;
    margin-bottom: 6px;
  }
  .brand h1 {
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .brand h1 span { color: var(--accent); }
  .tagline {
    color: var(--muted);
    font-size: 14px;
    margin-bottom: 28px;
  }
  textarea {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 10px;
    color: var(--text);
    font-family: "JetBrains Mono", monospace;
    font-size: 16px;
    line-height: 1.5;
    padding: 16px;
    resize: none;
    min-height: 58px;
    outline: none;
    transition: border-color 0.15s ease;
  }
  textarea:focus { border-color: var(--accent-dim); }
  textarea::placeholder { color: var(--muted); }

  /* Signature element: the link materializes under the input as you type */
  .linkbar {
    margin-top: 14px;
    display: flex;
    align-items: stretch;
    gap: 8px;
    opacity: 0;
    transform: translateY(-4px);
    transition: opacity 0.2s ease, transform 0.2s ease;
    pointer-events: none;
  }
  .linkbar.live { opacity: 1; transform: none; pointer-events: auto; }
  .linkbar .url {
    flex: 1;
    min-width: 0;
    background: var(--surface-2);
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 10px 12px;
    font-family: "JetBrains Mono", monospace;
    font-size: 12.5px;
    color: var(--muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    line-height: 1.6;
  }
  .linkbar .url b { color: var(--accent); font-weight: 500; }
  button {
    font-family: "Space Grotesk", system-ui, sans-serif;
    font-size: 13.5px;
    font-weight: 500;
    border: 1px solid var(--line);
    background: var(--surface-2);
    color: var(--text);
    border-radius: 8px;
    padding: 0 16px;
    cursor: pointer;
    transition: border-color 0.15s ease, background 0.15s ease;
    white-space: nowrap;
  }
  button:hover { border-color: var(--accent-dim); }
  button:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  button.copied { border-color: var(--ok); color: var(--ok); }

  /* View mode (when opening a link that contains text) */
  .view { display: none; }
  body.viewing .compose { display: none; }
  body.viewing .view { display: block; }
  .view .line {
    background: var(--surface);
    border: 1px solid var(--line);
    border-left: 3px solid var(--accent);
    border-radius: 10px;
    padding: 22px 20px;
    font-family: "JetBrains Mono", monospace;
    font-size: 17px;
    line-height: 1.6;
    word-break: break-word;
    white-space: pre-wrap;
  }
  .view .actions { display: flex; gap: 8px; margin-top: 14px; }
  .view .actions button { padding: 10px 16px; }
  a.newline { color: var(--muted); font-size: 13.5px; text-decoration: none; }
  a.newline:hover { color: var(--accent); }

  footer {
    margin-top: 40px;
    color: var(--muted);
    font-size: 12.5px;
    text-align: center;
  }
  @media (prefers-reduced-motion: reduce) {
    * { transition: none !important; }
  }
</style>
</head>
<body>
<main>
  <div class="brand"><h1>one<span>line</span></h1></div>

  <section class="compose">
    <p class="tagline">Paste a line of text. The link below carries it — no server, no database.</p>
    <textarea id="input" rows="1" placeholder="Paste your line here…" autofocus spellcheck="false"></textarea>
    <div class="linkbar" id="linkbar" aria-live="polite">
      <div class="url" id="urlPreview"></div>
      <button id="copyLink">Copy link</button>
    </div>
  </section>

  <section class="view">
    <p class="tagline">Someone sent you this line:</p>
    <div class="line" id="lineOut"></div>
    <div class="actions">
      <button id="copyText">Copy text</button>
      <button id="copyLink2">Copy link</button>
      <a class="newline" href="#" id="writeNew" style="align-self:center; margin-left:6px;">Write your own →</a>
    </div>
  </section>

  <footer>Text is stored in the URL itself — share the link, share the line.</footer>
</main>

<script>
  const input = document.getElementById("input");
  const linkbar = document.getElementById("linkbar");
  const urlPreview = document.getElementById("urlPreview");
  const lineOut = document.getElementById("lineOut");

  const base = () => location.origin + location.pathname;

  function encode(text) {
    return btoa(String.fromCharCode(...new TextEncoder().encode(text)))
      .replace(/\+/g, "-").replace(/\//g, "_").replace(/=+$/, "");
  }
  function decode(hash) {
    const b64 = hash.replace(/-/g, "+").replace(/_/g, "/");
    const bin = atob(b64);
    return new TextDecoder().decode(Uint8Array.from(bin, c => c.charCodeAt(0)));
  }

  function currentLink() {
    return base() + "#" + encode(input.value.trim());
  }

  function refresh() {
    const text = input.value.trim();
    if (!text) { linkbar.classList.remove("live"); return; }
    linkbar.classList.add("live");
    const link = currentLink();
    const shown = link.length > 70 ? link.slice(0, 46) + "…" + link.slice(-18) : link;
    urlPreview.innerHTML = "";
    const b = document.createElement("b");
    b.textContent = shown;
    urlPreview.appendChild(b);
    // Auto-grow textarea
    input.style.height = "auto";
    input.style.height = input.scrollHeight + "px";
  }
  input.addEventListener("input", refresh);

  function flash(btn, label) {
    const old = btn.textContent;
    btn.textContent = label;
    btn.classList.add("copied");
    setTimeout(() => { btn.textContent = old; btn.classList.remove("copied"); }, 1400);
  }

  document.getElementById("copyLink").addEventListener("click", async (e) => {
    if (!input.value.trim()) return;
    await navigator.clipboard.writeText(currentLink());
    flash(e.target, "Copied ✓");
  });

  // View mode: if the URL contains a hash, decode and show it
  function tryViewMode() {
    const hash = location.hash.slice(1);
    if (!hash) return;
    try {
      const text = decode(hash);
      lineOut.textContent = text;
      document.body.classList.add("viewing");
      document.getElementById("copyText").onclick = async (e) => {
        await navigator.clipboard.writeText(text);
        flash(e.target, "Copied ✓");
      };
      document.getElementById("copyLink2").onclick = async (e) => {
        await navigator.clipboard.writeText(location.href);
        flash(e.target, "Copied ✓");
      };
      document.getElementById("writeNew").onclick = (e) => {
        e.preventDefault();
        history.replaceState(null, "", base());
        document.body.classList.remove("viewing");
        input.value = "";
        refresh();
        input.focus();
      };
    } catch { /* malformed hash — stay in compose mode */ }
  }
  tryViewMode();
  window.addEventListener("hashchange", tryViewMode);
</script>
</body>
</html>
